      let toggler = document.getElementById("toggler");

      // let utility2 = document.getElementById("utilityWrap2");
      window.onload = function () {
        page1.classList.add("visible");
      };

      function openNav() {
        nav.classList.toggle("expand");
        toggler.classList.toggle("togglerActive");
        menu.classList.toggle("display");
        ham.classList.toggle("active");
        // utility.classList.toggle("display");
      }
      function closeNav() {
        toggler.classList.remove("togglerActive");
        nav.classList.remove("expand");
        ham.classList.remove("active");
        menu.classList.remove("display");
        utility.classList.remove("display");
      }
      function openUser() {
        user.classList.toggle("expand");
        toggler2.classList.toggle("togglerActive");
        ham2.classList.toggle("active");
        // utility.classList.toggle("display");
        userMenu.classList.toggle("display");
      }

      function closeUser() {
        userPanel.classList.remove("expand");
        toggler2.classList.remove("togglerActive");
        ham2.classList.remove("active");
        user.classList.remove("expand");
        userMenu.classList.remove("display");
        utility.classList.remove("display");
      }
      function displayUtility() {
        utility.classList.add("display");
      }
      toggler.addEventListener("click", function () {
        closeUser();
        openNav();
        utility.classList.add("display");
      });

      toggler2.addEventListener("click", function () {
        openUser();
        closeNav();
        utility.classList.add("display");
      });

      utility.addEventListener("click", function () {
        closeNav();
        closeUser();
